version: '3.8'
services:

  nginx:
    image: nginx:stable-alpine
    container_name: rayd_proxy
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - rayd-app
    restart: always

  rayd-app:
    build: .
    container_name: rayd_service
    restart: always
    ports:
      - "6661:6661"
    environment:
      # ── Core ─────────────────────────────────────────────────
      - TZ=Asia/Beirut
      - SECRET_KEY=P@ssw0rd123!
      - LD_LIBRARY_PATH=/opt/oracle/instantclient_21_13

      # ── Database ─────────────────────────────────────────────
      - POSTGRES_USER=etl_user
      - POSTGRES_PASSWORD=SecureCrynBabe
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=etl_db

      # ── Feature Flags ─────────────────────────────────────────
      - PATIENT_PORTAL_ENABLED=true
      - LIVE_FEED_ENABLED=true

      # ── BitNet AI Assistant ───────────────────────────────────
      - BITNET_ENABLED=true
      # llama-server runs on the host, container reaches it via docker bridge IP
      - BITNET_SERVER=http://172.17.0.1:8081
      - BITNET_TOKENS=200
      - BITNET_TIMEOUT=120

    volumes:
      # No longer needed for inference (llama-server runs on host)
      # Kept in case health check or fallback needs it
      - /home/stats/BitNet:/home/stats/BitNet:ro

    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: rayd_db
    restart: always
    environment:
      - POSTGRES_USER=etl_user
      - POSTGRES_PASSWORD=SecureCrynBabe
      - POSTGRES_DB=etl_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
