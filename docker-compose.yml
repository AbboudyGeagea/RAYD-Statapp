version: '3.8'

services:
  # 1. THE DATABASE
  db_server:
    image: postgres:15
    container_name: rayd_db_container
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d 
    ports:
      - "5432:5432"

  # 2. THE FLASK APP
  web_app:
    build: .
    container_name: rayd_app_container
    restart: always
    expose:
      - "8080"
    env_file:
      - .env
    depends_on:
      - db_server

  # 3. THE FRONT DOOR (NGINX)
  nginx:
    image: nginx:latest
    container_name: rayd_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - web_app

volumes:
  postgres_data:
