# Standalone dev compose — runs the app stack locally without nginx/TLS.
# Exposes port 5432 so MCP tools and psql can connect directly.
# Credentials are intentionally minimal dev values; never use in production.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#
# Then Claude Code MCP (rayd-postgres) can connect via localhost:5432.
services:

  rayd-app:
    build: .
    container_name: rayd_service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Beirut
      - SECRET_KEY=dev-secret-key-change-in-prod
      - POSTGRES_USER=etl_user
      - POSTGRES_PASSWORD=etl_pass
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=etl_db
      - MASTER_ADMIN_KEY=dev-admin-key
      - PATIENT_PORTAL_ENABLED=false
      - LIVE_FEED_ENABLED=true
      - BITNET_ENABLED=false
      - LD_LIBRARY_PATH=/opt/oracle/instantclient_21_13
    depends_on:
      db:
        condition: service_healthy

  nlp-worker:
    build: ./nlp_worker
    container_name: rayd_nlp
    restart: unless-stopped
    environment:
      - TZ=Asia/Beirut
      - POSTGRES_USER=etl_user
      - POSTGRES_PASSWORD=etl_pass
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=etl_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: rayd_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=etl_user
      - POSTGRES_PASSWORD=etl_pass
      - POSTGRES_DB=etl_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./init-db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_db"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_dev_data:
