<!DOCTYPE html>
<html>
<head>
    <title>RAYD | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #181f1c; font-family: 'Inter', sans-serif; }
        .input-box { background: #181f1c; border: 1px solid #28332e; color: #e2e8f0; padding: 10px; border-radius: 8px; width: 100%; outline: none; transition: border 0.15s; }
        .input-box:focus { border-color: #60a5fa; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="w-full max-w-md p-8 bg-[#232b28] rounded-xl border border-[#28332e] shadow-2xl">
        <h2 class="text-2xl font-black text-[#60a5fa] mb-6 tracking-tighter">CREATE ACCOUNT</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-3 rounded text-xs font-bold {{ 'bg-red-500/20 text-red-400' if category == 'danger' else 'bg-emerald-500/20 text-emerald-400' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Username</label>
                <input type="text" name="username" class="input-box" required>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Password</label>
                <input type="password" name="password" class="input-box" required>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Select Role</label>
                <select name="role" id="roleSelect" onchange="toggleAdmin()" class="input-box">
                    <option value="viewer">Viewer</option>
                    <option value="tec">Tec</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>

            <div id="adminKeyArea" class="hidden">
                <label class="text-[10px] font-bold text-yellow-500 uppercase tracking-widest">Admin Secret Key</label>
                <input type="password" name="admin_key" class="input-box border-yellow-500/50" placeholder="Required for Admin role">
            </div>

            <button type="submit" class="w-full py-3 mt-4 bg-[#60a5fa] text-[#0a1628] font-black rounded-lg uppercase text-xs tracking-widest hover:brightness-110 transition-all">
                Finalize Registration
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="{{ url_for('auth.login') }}" class="text-xs text-slate-500 hover:text-white transition-colors">Already have an account? Login</a>
        </div>
    </div>

    <script>
        function toggleAdmin() {
            const role = document.getElementById('roleSelect').value;
            const area = document.getElementById('adminKeyArea');
            if (role === 'admin') {
                area.classList.remove('hidden');
            } else {
                area.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
