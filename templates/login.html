<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RAYD | Portal Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #ffffff;
        }

        /* FULL SCREEN WATERMARK */
        .rayd-watermark {
            position: fixed;
            top: 55%; /* Slighly lower than center for visual balance */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65vw;
            height: auto;
            opacity: 0.06;
            z-index: 0;
            pointer-events: none;
        }

        /* Float inputs with glass effect borders */
        .floating-input {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        .floating-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #38ada9;
            box-shadow: 0 10px 25px -5px rgba(56, 173, 169, 0.1);
        }

        /* Ensure text is readable over watermark */
        .label-shadow {
            text-shadow: 0 1px 2px rgba(255,255,255,1);
        }
    </style>
</head>
<body class="bg-white">

    <img src="{{ url_for('static', filename='RAYD.png') }}" class="rayd-watermark" alt="">

    <header class="w-full bg-white border-b border-slate-100 py-8 flex justify-center items-center z-10">
        <img src="{{ url_for('static', filename='intermedic.jpeg') }}" class="h-20 w-auto object-contain">
    </header>

    <main class="flex-1 flex items-center justify-center p-6 z-10">
        <div class="w-full max-w-sm">
            
            <div class="text-center mb-12">
                <h2 class="text-5xl font-black text-slate-800 uppercase tracking-tighter mb-2">RAYD</h2>
                <div class="h-1 w-12 bg-[#38ada9] mx-auto rounded-full mb-4"></div>
                <p class="text-slate-500 font-bold uppercase tracking-[0.3em] text-[11px] label-shadow">Secure Analytics Gateway</p>
            </div>

            <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm" class="space-y-8">
                <input type="hidden" name="override" id="overrideInput" value="false">
                
                <div class="relative">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 ml-1 label-shadow">Identity</label>
                    <input type="text" name="username" placeholder="Username" required 
                           class="w-full px-6 py-5 rounded-2xl floating-input outline-none font-bold text-slate-700 text-lg">
                </div>

                <div class="relative">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 ml-1 label-shadow">Credential</label>
                    <input type="password" name="password" placeholder="Password" required 
                           class="w-full px-6 py-5 rounded-2xl floating-input outline-none font-bold text-slate-700 text-lg">
                </div>

                <button type="submit" class="w-full py-5 bg-slate-900 text-white font-black rounded-2xl shadow-2xl hover:bg-[#38ada9] transition-all duration-500 uppercase tracking-[0.25em] text-xs mt-6">
                   Sign In to RAYD
                </button>
            </form>
        </div>
    </main>

    <footer class="w-full bg-white py-10 flex flex-col items-center gap-3 z-10">
        <div class="h-px w-24 bg-slate-100 mb-2"></div>
        <span class="text-[9px] font-black text-slate-400 uppercase tracking-[0.5em]">Global Technology Partner</span>
        <img src="{{ url_for('static', filename='philips.jpg') }}" class="h-12 w-auto object-contain grayscale opacity-40 hover:opacity-100 transition duration-700">
    </footer>

    <div id="conflictModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/40 backdrop-blur-sm">
        <div class="bg-white rounded-[2.5rem] p-12 w-full max-w-md shadow-2xl border border-slate-100 text-center">
            <div class="w-20 h-20 bg-amber-50 text-amber-500 rounded-3xl flex items-center justify-center mb-8 mx-auto text-4xl">
                <i class="bi bi-shield-fill-exclamation"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-800 mb-3">Session Active</h3>
            <p class="text-slate-500 mb-10 text-sm font-medium leading-relaxed">This account is currently active in another browser. Terminate existing session?</p>
            <div class="space-y-3">
                <button id="doOverride" class="w-full py-4 rounded-xl bg-[#38ada9] text-white font-bold shadow-lg shadow-teal-500/20">Confirm & Override</button>
                <button id="cancelOverride" class="w-full py-4 rounded-xl text-slate-400 font-bold hover:text-slate-600 transition">Go Back</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var conflict = {{ 'true' if conflict|default(False) else 'false' }};
            if (conflict) {
                document.getElementById('conflictModal').classList.remove('hidden');
                document.getElementById('conflictModal').classList.add('flex');
            }
            document.getElementById('doOverride')?.addEventListener('click', () => {
                document.getElementById('overrideInput').value = 'true';
                document.getElementById('loginForm').submit();
            });
            document.getElementById('cancelOverride')?.addEventListener('click', () => {
                document.getElementById('conflictModal').classList.add('hidden');
            });
        });
    </script>
</body>
</html>
