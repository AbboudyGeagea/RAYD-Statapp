{% if demo_mode %}
<div style="background:rgba(245,158,11,0.12);border-bottom:1px solid rgba(245,158,11,0.3);padding:5px 24px;display:flex;align-items:center;justify-content:center;gap:10px;z-index:40;position:relative;">
    <span style="font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:0.2em;color:#f59e0b;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);padding:2px 8px;border-radius:4px;">DEMO</span>
    <span style="font-size:11px;font-weight:700;color:#fbbf24;">Showing data from <strong>{{ demo_start }}</strong> to <strong>{{ demo_end }}</strong> — All features enabled</span>
</div>
{% endif %}
<header class="bg-[#232b28] border-b border-[#28332e] px-6 py-3 flex items-center justify-between shadow-md z-30 relative flex-shrink-0">
    <!-- Left: Logo -->
    <div class="flex items-center gap-3">
        <button onclick="window.print()" title="Print / Export PDF"
            class="p-2 rounded-lg hover:bg-[#2a3530] transition-colors text-[#34d399] text-lg">
            <i class="bi bi-printer-fill"></i>
        </button>
        <img src="{{ url_for('static', filename='RAYD.png') }}" class="h-14 w-auto" style="mix-blend-mode:screen;">
    </div>

    <!-- Right: Tagline between two blue lines + theme toggle -->
    <div class="flex items-center gap-4">
        <div class="flex flex-col items-end gap-1.5">
            <div class="h-px w-64 bg-[#60a5fa] opacity-70"></div>
            <p class="text-[11px] font-black tracking-[0.2em] uppercase text-[#60a5fa]">Reliable Analytics For Your Department</p>
            <div class="h-px w-64 bg-[#60a5fa] opacity-70"></div>
        </div>
        <button onclick="toggleTheme()" title="Toggle light/dark mode"
            class="p-2 rounded-lg hover:bg-[#2a3530] transition-colors text-[#60a5fa] text-lg">
            <i id="theme-icon" class="bi bi-moon-fill"></i>
        </button>
    </div>
</header>
<script>
// ── Async filter-option loader ────────────────────────────────────────────
// Called once per page. Fetches /api/filter-options (server-cached 5 min),
// then populates every <select data-filter-key="KEY"> on the page.
// Selected values that were POSTed back are preserved via data-selected.
document.addEventListener('DOMContentLoaded', function () {
    const selects = document.querySelectorAll('select[data-filter-key]');
    if (!selects.length) return;

    fetch('/api/filter-options')
        .then(r => r.json())
        .then(opts => {
            selects.forEach(sel => {
                const key      = sel.dataset.filterKey;
                const values   = opts[key] || [];
                const selected = (sel.dataset.selected || '').split('||').filter(Boolean);
                const current  = [...sel.options].map(o => o.value);

                values.forEach(v => {
                    if (current.includes(v)) return;
                    const o = document.createElement('option');
                    o.value = v; o.textContent = v;
                    sel.appendChild(o);
                });

                if (window.$ && $(sel).hasClass('select2-js')) {
                    // Select2 initialized before options arrived — destroy and
                    // re-init so it picks up the newly added option elements.
                    if ($(sel).data('select2')) $(sel).select2('destroy');
                    $(sel).select2();
                    const validSel = selected.filter(v => values.includes(v));
                    if (validSel.length) $(sel).val(validSel).trigger('change');
                } else {
                    // Plain <select>: mark previously chosen values as selected.
                    selected.forEach(v => {
                        const opt = [...sel.options].find(o => o.value === v);
                        if (opt) opt.selected = true;
                    });
                }
            });
        })
        .catch(() => {});
});
</script>
