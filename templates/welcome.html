<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RAYD</title>
    <script src="{{ url_for('static', filename='js/tailwind.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.css') }}">
    <style>
        :root { --accent: #60a5fa; }
        body { font-family: 'Inter', sans-serif; background: #181f1c; color: #e2e8f0; }
        .sidebar-item { transition: all 0.18s ease; border: 1px solid transparent; border-radius: 0.75rem; margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; font-size: 0.875rem; font-weight: 700; color: #94a3b8; text-decoration: none; }
        .sidebar-item:hover { background: rgba(96,165,250,0.08); border-color: rgba(96,165,250,0.3); color: #60a5fa; }
        body.light { background: #f0f4f8; color: #1a202c; }
        body.light aside, body.light header { background: #ffffff !important; border-color: #e2e8f0 !important; }
        body.light .sidebar-item { color: #4a5568; }
        body.light .sidebar-item:hover { background: #e2e8f0; color: #2b6cb0 !important; }
        body.light main { background: #f0f4f8 !important; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

{% include '_header.html' %}

<div class="flex flex-1 overflow-hidden">
    {% include '_sidebar.html' %}

    <!-- MAIN -->
    <main class="flex-1 overflow-y-auto bg-[#181f1c] flex items-center justify-center">
        <div class="flex flex-col items-center gap-10 select-none px-8 text-center">

            <!-- Clock -->
            <div class="flex flex-col items-center gap-1">
                <p id="clock-date" class="text-[13px] font-bold text-[#94a3b8] tracking-widest uppercase"></p>
                <p id="clock-time" class="text-[4rem] font-black text-[#e2e8f0] tabular-nums" style="line-height:1;letter-spacing:-0.03em;"></p>
            </div>

            <!-- Divider -->
            <div class="h-px w-48 bg-gradient-to-r from-transparent via-[#60a5fa] to-transparent opacity-40"></div>

            <!-- Hero text -->
            <div class="flex flex-col items-center gap-3">
                <h1 class="font-black text-[#e2e8f0] leading-none" style="font-size:clamp(3rem,8vw,7rem);letter-spacing:-0.04em;">
                    Welcome to
                    <span style="background:linear-gradient(135deg,#60a5fa 0%,#34d399 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
                        RAYD
                    </span>
                </h1>
                <p class="text-[#64748b] font-semibold tracking-widest uppercase" style="font-size:clamp(0.65rem,1.2vw,0.85rem);">
                    Reliable Analytics for Your Department
                </p>
            </div>

            <!-- Divider -->
            <div class="h-px w-48 bg-gradient-to-r from-transparent via-[#34d399] to-transparent opacity-40"></div>

            <!-- Tagline -->
            <p class="text-[#475569] font-medium max-w-lg" style="font-size:clamp(0.8rem,1.4vw,1rem);line-height:1.8;">
                Your radiology intelligence platform — real-time modality status,<br>
                physician analytics, HL7 integration, and AI-assisted reporting.
            </p>

        </div>
    </main>
</div>

<script>
(function () {
    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    function tick() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2,'0');
        const m = String(now.getMinutes()).padStart(2,'0');
        const s = String(now.getSeconds()).padStart(2,'0');
        document.getElementById('clock-time').textContent = h + ':' + m + ':' + s;
        document.getElementById('clock-date').textContent =
            days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
    }
    tick();
    setInterval(tick, 1000);
})();

(function () {
    const saved = localStorage.getItem('rayd_theme');
    if (saved === 'light') document.body.classList.add('light');
    const icon = document.getElementById('theme-icon');
    if (icon) icon.className = saved === 'light' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
})();
function toggleTheme() {
    const light = document.body.classList.toggle('light');
    localStorage.setItem('rayd_theme', light ? 'light' : 'dark');
    const icon = document.getElementById('theme-icon');
    if (icon) icon.className = light ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
}
</script>
</body>
</html>
