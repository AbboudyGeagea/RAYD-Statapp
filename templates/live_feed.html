<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RAYD | Live AE Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg:      #0a0f0d;
            --surface: #111714;
            --border:  #1a2420;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:#e2e8f0; min-height:100vh; }
        ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:#1a2420; border-radius:10px; }

        /* ── Tile ── */
        .ae-tile {
            border-radius:16px; padding:20px; border:1px solid;
            display:flex; flex-direction:column; gap:10px;
            transition:all 0.4s ease; position:relative; overflow:hidden;
        }
        .ae-tile::before {
            content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:16px 16px 0 0;
        }

        /* Status themes */
        .tile-busy    { background:#0d1f14; border-color:#166534; }
        .tile-busy::before    { background:linear-gradient(90deg,#15803d,#4ade80); }

        .tile-delayed { background:#1c0f0a; border-color:#92400e; animation:pulse-delayed 2s ease-in-out infinite; }
        .tile-delayed::before { background:linear-gradient(90deg,#b45309,#fbbf24); }

        .tile-early   { background:#0a1020; border-color:#1d4ed8; }
        .tile-early::before   { background:linear-gradient(90deg,#1d4ed8,#60a5fa); }

        .tile-free    { background:#111714; border-color:#1a2420; }
        .tile-free::before    { background:#1a2420; }

        .tile-closed  { background:#0d0f0e; border-color:#0f1712; opacity:0.45; }
        .tile-closed::before  { background:#111; }

        @keyframes pulse-delayed {
            0%,100% { box-shadow:0 0 0 0 rgba(251,191,36,0); }
            50%     { box-shadow:0 0 0 6px rgba(251,191,36,0.12); }
        }

        /* Status dot */
        .status-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
        .dot-busy    { background:#4ade80; box-shadow:0 0 8px #22c55e; animation:blink 1.5s ease-in-out infinite; }
        .dot-delayed { background:#fbbf24; box-shadow:0 0 8px #f59e0b; animation:blink 0.8s ease-in-out infinite; }
        .dot-early   { background:#60a5fa; box-shadow:0 0 8px #3b82f6; }
        .dot-free    { background:#1f3028; }
        .dot-closed  { background:#111; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* Countdown ring */
        .ring-wrap { position:relative; width:52px; height:52px; flex-shrink:0; }
        .ring-svg  { transform:rotate(-90deg); }
        .ring-bg   { fill:none; stroke:#1a2420; stroke-width:4; }
        .ring-fill { fill:none; stroke-width:4; stroke-linecap:round;
                     transition:stroke-dashoffset 1s linear; }
        .ring-text { position:absolute; inset:0; display:flex; align-items:center;
                     justify-content:center; font-family:'JetBrains Mono',monospace;
                     font-size:11px; font-weight:700; }

        /* AE label */
        .ae-label { font-size:15px; font-weight:900; color:white; letter-spacing:-0.02em; }
        .mod-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; }

        /* Info rows */
        .info-row { font-size:11px; color:#94a3b8; display:flex; align-items:center; gap:6px; }
        .info-val  { color:#e2e8f0; font-weight:700; }
        .info-row i { font-size:11px; width:14px; text-align:center; flex-shrink:0; }

        /* Delay badge */
        .delay-badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px;
            border-radius:4px; font-size:9px; font-weight:900; text-transform:uppercase; }

        /* Header */
        .live-header { background:var(--surface); border-bottom:1px solid var(--border);
            padding:14px 32px; display:flex; align-items:center; justify-content:space-between; }

        /* Stats bar */
        .stat-chip { background:var(--surface); border:1px solid var(--border); border-radius:10px;
            padding:8px 16px; display:flex; align-items:center; gap:8px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header -->
    <header class="live-header sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <img src="{{ url_for('static', filename='RAYD.png') }}" class="h-10 w-auto opacity-85">
            <div>
                <h1 class="text-white font-black text-lg uppercase tracking-tight leading-none">Live AE Status</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-0.5">
                    Real-time radiology floor map
                </p>
            </div>
        </div>

        <!-- Summary chips -->
        <div class="flex items-center gap-3" id="summary-bar">
            <div class="stat-chip"><span class="status-dot dot-busy"></span><span class="text-xs font-black text-green-400" id="cnt-busy">—</span><span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Busy</span></div>
            <div class="stat-chip"><span class="status-dot dot-delayed"></span><span class="text-xs font-black text-yellow-400" id="cnt-delayed">—</span><span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Delayed</span></div>
            <div class="stat-chip"><span class="status-dot dot-early"></span><span class="text-xs font-black text-blue-400" id="cnt-early">—</span><span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Finished Early</span></div>
            <div class="stat-chip"><span class="status-dot dot-free"></span><span class="text-xs font-black text-slate-400" id="cnt-free">—</span><span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Free</span></div>
        </div>

        <!-- Clock + refresh indicator -->
        <div class="flex items-center gap-4">
            <div class="text-right">
                <p class="font-mono font-black text-white text-lg" id="clock">--:--:--</p>
                <p class="text-[9px] text-slate-600 font-bold uppercase tracking-widest" id="last-update">loading...</p>
            </div>
            <div class="relative w-8 h-8">
                <svg class="w-8 h-8 -rotate-90" viewBox="0 0 32 32">
                    <circle cx="16" cy="16" r="13" fill="none" stroke="#1a2420" stroke-width="3"/>
                    <circle cx="16" cy="16" r="13" fill="none" stroke="#22c55e" stroke-width="3"
                        stroke-linecap="round" stroke-dasharray="81.7"
                        id="refresh-ring" stroke-dashoffset="0" style="transition:stroke-dashoffset 1s linear;"/>
                </svg>
            </div>
        </div>
    </header>

    <!-- Grid -->
    <div class="flex-1 p-6">
        <div id="tile-grid" class="grid gap-4"
             style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr));">
            <!-- Skeleton loaders -->
            <div class="ae-tile tile-free animate-pulse" style="height:160px;"></div>
            <div class="ae-tile tile-free animate-pulse" style="height:160px;"></div>
            <div class="ae-tile tile-free animate-pulse" style="height:160px;"></div>
            <div class="ae-tile tile-free animate-pulse" style="height:160px;"></div>
        </div>
    </div>

<script>
let _version        = null;
let _refreshTimer   = null;
let _versionTimer   = null;
let _countdownTimer = null;
let _nextRefreshIn  = 60;
let _countdownSecs  = 60;

const CIRC = 81.7; // 2π×13

// ── Clock ─────────────────────────────────────────────────────────────
function tickClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
        now.toTimeString().slice(0, 8);
}
setInterval(tickClock, 1000);
tickClock();

// ── Countdown ring ────────────────────────────────────────────────────
function startCountdown(seconds) {
    clearInterval(_countdownTimer);
    _countdownSecs = seconds;
    const ring = document.getElementById('refresh-ring');
    ring.style.strokeDashoffset = 0;

    _countdownTimer = setInterval(() => {
        _countdownSecs--;
        if (_countdownSecs <= 0) {
            clearInterval(_countdownTimer);
            loadStatus();
            return;
        }
        const pct    = _countdownSecs / seconds;
        ring.style.strokeDashoffset = CIRC * (1 - pct);
    }, 1000);
}

// ── Load status ───────────────────────────────────────────────────────
async function loadStatus() {
    try {
        const res  = await fetch('/viewer/live/status');
        const data = await res.json();
        if (data.error) { console.error(data.error); return; }

        renderTiles(data.tiles);
        renderSummary(data.tiles);
        document.getElementById('last-update').textContent = `Updated ${data.as_of}`;

        // Schedule next refresh at exactly when next event happens
        const secs = Math.max((data.next_refresh_in || 60) * 60, 30);
        startCountdown(secs);

    } catch(e) { console.error('Status load failed:', e); }
}

// ── Poll HL7 version (every 15s) ──────────────────────────────────────
async function checkVersion() {
    try {
        const res  = await fetch('/viewer/live/version');
        const data = await res.json();
        if (_version && data.version !== _version) {
            // New HL7 order arrived — refresh immediately
            clearInterval(_countdownTimer);
            loadStatus();
        }
        _version = data.version;
    } catch(e) {}
}

// ── Render tiles ──────────────────────────────────────────────────────
function renderTiles(tiles) {
    document.getElementById('tile-grid').innerHTML = tiles.map(t => buildTile(t)).join('');
}

function buildTile(t) {
    const cls = {
        busy:'tile-busy', delayed:'tile-delayed', early:'tile-early',
        free:'tile-free', closed:'tile-closed'
    }[t.status] || 'tile-free';

    const dotCls = {
        busy:'dot-busy', delayed:'dot-delayed', early:'dot-early',
        free:'dot-free', closed:'dot-closed'
    }[t.status] || 'dot-free';

    const modColor = {
        CT:'#60a5fa', MR:'#a78bfa', US:'#34d399', XA:'#f87171',
        DX:'#fbbf24', NM:'#fb923c', MG:'#e879f9', PET:'#4ade80',
    }[t.modality?.toUpperCase()] || '#64748b';

    let statusLabel = { busy:'Active', delayed:'⚠ Delayed', early:'Finished Early', free:'Free', closed:'Closed' }[t.status] || t.status;

    // Build ring for busy/delayed
    let ringHtml = '';
    if ((t.status === 'busy' || t.status === 'delayed') && t.mins_remaining != null) {
        const pct = Math.min(t.mins_remaining / 60, 1);
        const offset = CIRC * (1 - pct);
        const ringColor = t.status === 'delayed' ? '#f59e0b' : '#4ade80';
        ringHtml = `
        <div class="ring-wrap">
            <svg class="ring-svg" width="52" height="52" viewBox="0 0 52 52">
                <circle cx="26" cy="26" r="21" class="ring-bg"/>
                <circle cx="26" cy="26" r="21" class="ring-fill"
                    stroke="${ringColor}"
                    stroke-dasharray="${Math.PI*2*21}"
                    stroke-dashoffset="${Math.PI*2*21*(1-pct)}"/>
            </svg>
            <div class="ring-text" style="color:${ringColor};">${t.mins_remaining}m</div>
        </div>`;
    }

    // Delay badge
    let delayHtml = '';
    if (t.delay_mins && t.delay_mins > 0) {
        delayHtml = `<div class="delay-badge" style="background:rgba(251,191,36,0.12);color:#fbbf24;border:1px solid rgba(251,191,36,0.25);">
            <i class="bi bi-clock-history"></i> ${t.delay_mins}m late
        </div>`;
    }
    if (t.status === 'early' && t.finished_early) {
        delayHtml = `<div class="delay-badge" style="background:rgba(96,165,250,0.1);color:#60a5fa;border:1px solid rgba(96,165,250,0.2);">
            <i class="bi bi-lightning-fill"></i> ${t.finished_early.early_by}m early
        </div>`;
    }

    // Procedure info
    let procHtml = '';
    if (t.proc_name && t.status !== 'free' && t.status !== 'closed') {
        procHtml = `
        <div class="info-row">
            <i class="bi bi-clipboard2-pulse" style="color:#64748b;"></i>
            <span class="info-val truncate" style="max-width:160px;" title="${escHtml(t.proc_name)}">${escHtml(t.proc_name)}</span>
        </div>`;
    }

    // Patient
    let patientHtml = '';
    if (t.patient_id && t.status !== 'free' && t.status !== 'closed') {
        patientHtml = `
        <div class="info-row">
            <i class="bi bi-person" style="color:#64748b;"></i>
            <span class="info-val font-mono">${escHtml(t.patient_id)}</span>
        </div>`;
    }

    // Next order
    let nextHtml = '';
    if (t.next_order) {
        nextHtml = `
        <div class="info-row" style="margin-top:4px;padding-top:8px;border-top:1px solid #1a2420;">
            <i class="bi bi-arrow-right-circle" style="color:#475569;"></i>
            <span style="color:#64748b;font-size:10px;">Next <strong style="color:#94a3b8;">${escHtml(t.next_order.at)}</strong> — ${escHtml(t.next_order.proc_name)}</span>
        </div>`;
    }

    // Free / closed message
    let freeHtml = '';
    if (t.status === 'free') {
        freeHtml = `<div class="info-row" style="color:#374151;font-size:12px;"><i class="bi bi-check-circle" style="color:#1f3028;"></i> No active procedure</div>`;
    }
    if (t.status === 'closed') {
        freeHtml = `<div class="info-row" style="color:#374151;font-size:12px;"><i class="bi bi-moon"></i> Closed today</div>`;
    }

    return `
    <div class="ae-tile ${cls}">
        <div class="flex items-start justify-between gap-2">
            <div class="flex items-center gap-2.5 min-w-0">
                <span class="status-dot ${dotCls}"></span>
                <div class="min-w-0">
                    <div class="ae-label truncate">${escHtml(t.aetitle)}</div>
                    <div class="mod-label" style="color:${modColor};">${escHtml(t.modality)}</div>
                </div>
            </div>
            <div class="flex flex-col items-end gap-1 shrink-0">
                ${ringHtml}
                ${!ringHtml ? `<span style="font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:0.08em;color:${modColor};">${statusLabel}</span>` : ''}
            </div>
        </div>

        ${delayHtml}
        ${procHtml}
        ${patientHtml}
        ${freeHtml}
        ${nextHtml}
    </div>`;
}

// ── Summary counts ─────────────────────────────────────────────────────
function renderSummary(tiles) {
    const counts = {busy:0, delayed:0, early:0, free:0};
    tiles.forEach(t => { if (counts[t.status] !== undefined) counts[t.status]++; });
    document.getElementById('cnt-busy').textContent    = counts.busy;
    document.getElementById('cnt-delayed').textContent = counts.delayed;
    document.getElementById('cnt-early').textContent   = counts.early;
    document.getElementById('cnt-free').textContent    = counts.free;
}

// ── Helpers ────────────────────────────────────────────────────────────
function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ───────────────────────────────────────────────────────────────
loadStatus();
setInterval(checkVersion, 15000);  // HL7 version check every 15s
</script>
</body>
</html>
