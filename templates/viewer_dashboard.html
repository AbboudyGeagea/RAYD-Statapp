<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | StatsApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #343a40; }
        .bg-accent { background-color: #38ada9; }
        .text-accent { color: #38ada9; }
        .card-report { transition: transform 0.2s; border: 1px solid #dee2e6; }
        .card-report:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="p-8">

<div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-8 p-4 rounded-xl border-b-2" style="background-color: #e9ecef;">
        <div class="flex items-center gap-3">
            <i class="bi bi-speedometer2 text-accent text-3xl"></i>
            <h1 class="text-2xl font-bold text-gray-800">Viewer Dashboard</h1>
        </div>
        <div class="flex gap-4">
            {% if current_user.role == 'admin' %}
                <a href="{{ url_for('admin.admin_panel') }}"
                   class="px-5 py-2 bg-white text-gray-700 rounded-lg shadow-sm border font-semibold hover:bg-gray-50 transition">
                    Admin Panel
                </a>
                <a href="{{ url_for('mapping.mapping_page') }}"
                   class="px-5 py-2 bg-white text-gray-700 rounded-lg shadow-sm border font-semibold hover:bg-gray-50 transition">
                    Mapping
                </a>
            {% endif %}
            <a href="{{ url_for('auth.logout') }}"
               class="px-5 py-2 bg-red-600 text-white rounded-lg shadow-md font-semibold hover:bg-red-700 transition">
                Logout
            </a>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        {% for report in reports %}
        <div class="bg-white rounded-2xl p-6 card-report flex flex-col shadow-sm">
            <div class="flex items-center gap-3 mb-4">
                <div class="p-2 bg-teal-50 rounded-lg text-accent">
                    <i class="bi bi-file-earmark-bar-graph text-xl"></i>
                </div>
                <h2 class="text-lg font-bold text-gray-800">{{ report.report_name }}</h2>
            </div>

            <p class="text-gray-500 text-sm mb-6 flex-1">
                {{ report.long_description }}
            </p>

            <!-- ✅ CLEAN, TOKEN-FREE LINK -->
            <a href="{{ url_for('view_report', report_id=report.report_id) }}"
               target="_blank"
               class="w-full py-3 bg-accent text-white text-center font-bold rounded-xl shadow-lg hover:opacity-90 transition">
                Launch Report Analysis
            </a>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
