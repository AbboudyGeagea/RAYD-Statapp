<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RAYD | Population Intel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0f0e; color: #e2e8f0; height: 100vh; overflow: hidden; }
        .input-dark { background: #141a18; border: 1px solid #2d3733; color: #e2e8f0; border-radius: 0.5rem; padding: 0.6rem; font-size: 11px; width: 100%; outline: none; }
        .data-card { background: #141a18; border: 1px solid #2d3733; border-radius: 1rem; overflow: hidden; }
        .card-header { padding: 1rem; border-bottom: 1px solid #2d3733; font-size: 10px; font-weight: 900; color: #818cf8; text-transform: uppercase; letter-spacing: 0.1em; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2d3733; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">
    <header class="h-16 bg-[#141a18] border-b border-[#2d3733] flex items-center px-8 justify-between shrink-0">
        <div class="flex items-center gap-4">
            <img src="{{ url_for('static', filename='RAYD.png') }}" class="h-8">
            <span class="text-xs font-black tracking-widest text-slate-500">POPULATION INTEL</span>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-72 bg-[#141a18] border-r border-[#2d3733] flex flex-col p-6 overflow-y-auto">
            <form method="POST" class="space-y-6">
                <div class="space-y-4">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Date Range</label>
                    <input type="date" name="start_date" class="input-dark" value="{{ display_start }}">
                    <input type="date" name="end_date" class="input-dark" value="{{ display_end }}">
                </div>
                <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-bold text-xs uppercase rounded-lg hover:bg-indigo-500 transition-all">Update Dashboard</button>
            </form>
        </aside>

        <main class="flex-1 overflow-y-auto p-8 space-y-8 custom-scrollbar">
            {% if run_report %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="data-card p-6 border-l-4 border-l-indigo-500">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Analyzed Studies</p>
                    <p class="text-4xl font-black text-white">{{ "{:,}".format(metrics.total_count) }}</p>
                </div>
                <div class="data-card p-6 border-l-4 border-l-emerald-500">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Avg System Age</p>
                    <p class="text-4xl font-black text-white">Mixed Demographics</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="data-card h-80 flex flex-col">
                    <div class="card-header">Patient Class Distribution (Bar)</div>
                    <div id="classChart" class="flex-1"></div>
                </div>
                <div class="data-card h-80 flex flex-col">
                    <div class="card-header">Average Age by Modality</div>
                    <div id="modAgeChart" class="flex-1"></div>
                </div>
                <div class="data-card h-80 flex flex-col">
                    <div class="card-header">Age Group Breakdown</div>
                    <div id="ageDistChart" class="flex-1"></div>
                </div>
                <div class="data-card h-80 flex flex-col">
                    <div class="card-header">Gender Ratio</div>
                    <div id="genderChart" class="flex-1"></div>
                </div>
                <div class="data-card h-96 lg:col-span-2 flex flex-col">
                    <div class="card-header">Top 10 High-Frequency Patients</div>
                    <div id="repetitiveChart" class="flex-1"></div>
                </div>
            </div>
            {% endif %}
        </main>
    </div>

    <script>
        const d = {{ chart_json | safe if chart_json else 'null' }};
        if (d) {
            // Class Bar (Sunset)
            echarts.init(document.getElementById('classChart')).setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: d.class.labels, axisLabel: { color: '#94a3b8', fontSize: 10 } },
                yAxis: { type: 'value', splitLine: { lineStyle: { color: '#2d3733' } } },
                series: [{ data: d.class.values, type: 'bar', itemStyle: { borderRadius: [4,4,0,0], color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#f43f5e'},{offset:1,color:'#fb923c'}]) } }]
            });

            // Modality Age (Amber)
            echarts.init(document.getElementById('modAgeChart')).setOption({
                tooltip: { trigger: 'axis' },
                grid: { left: '15%', right: '10%' },
                xAxis: { type: 'value', splitLine: { lineStyle: { color: '#2d3733' } } },
                yAxis: { type: 'category', data: d.mod_age.labels, axisLabel: { color: '#e2e8f0' } },
                series: [{ data: d.mod_age.values, type: 'bar', itemStyle: { borderRadius: [0,4,4,0], color: new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#d97706'},{offset:1,color:'#fbbf24'}]) }, label: { show: true, position: 'right', color: '#fff' } }]
            });

            // Age Dist (Indigo)
            echarts.init(document.getElementById('ageDistChart')).setOption({
                xAxis: { type: 'category', data: d.age_dist.labels },
                yAxis: { type: 'value', splitLine: { show: false } },
                series: [{ data: d.age_dist.values, type: 'bar', itemStyle: { color: '#6366f1' } }]
            });

            // Gender (Pie)
            echarts.init(document.getElementById('genderChart')).setOption({
                series: [{ type: 'pie', radius: ['40%', '70%'], data: d.gender.labels.map((l, i) => ({ name: l, value: d.gender.values[i], itemStyle: { color: l === 'F' ? '#ec4899' : '#0ea5e9' } })), label: { color: '#fff' } }]
            });

            // Repetitive (Emerald)
            echarts.init(document.getElementById('repetitiveChart')).setOption({
                grid: { left: '20%' },
                xAxis: { type: 'value' },
                yAxis: { type: 'category', data: d.repetitive.labels, inverse: true },
                series: [{ data: d.repetitive.values, type: 'bar', itemStyle: { color: '#10b981' } }]
            });
        }
    </script>
</body>
</html>
