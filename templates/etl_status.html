<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RAYD | ETL Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* CSS Same as Dashboard above for perfect transition */
        html { font-size: 100%; font-family: 'Inter', sans-serif; }
        :root { --accent: #60a5fa; }
        body { font-family: 'Inter', sans-serif; background: #181f1c; color: #e2e8f0; }
        .sidebar-item { 
            transition: all 0.2s; border-radius: 0.75rem; margin-bottom: 0.25rem; cursor: pointer; 
            font-family: 'Inter', sans-serif !important; font-weight: 700; display: flex;
            align-items: center; gap: 0.75rem; padding: 0.625rem 1rem; font-size: 0.75rem; color: #e2e8f0;
        }
        .sidebar-item:hover { background: #232b28; color: var(--accent); }
        .sidebar-item.active { background: #232b28; color: var(--accent); border-left: 4px solid var(--accent); }
        .banner-integrated {
            background: linear-gradient(90deg, rgba(24,31,28,0) 0%, rgba(35,43,40,1) 50%, rgba(24,31,28,0) 100%);
            border-bottom: 1px solid rgba(96,165,250,0.05);
        }
        .table-container { background: #232b28; border-radius: 1.5rem; padding: 2.5rem; border: 1px solid #28332e; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <header class="banner-integrated px-12 py-6 flex items-center justify-center z-30 relative">
        <div class="flex flex-col items-center">
            <img src="{{ url_for('static', filename='RAYD.png') }}" class="h-24 w-auto brightness-110 drop-shadow-[0_0_15px_rgba(96,165,250,0.3)]" alt="RAYD">
            <div class="h-[2px] w-48 bg-gradient-to-r from-transparent via-[#60a5fa] to-transparent mt-3 opacity-40"></div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 bg-[#232b28] border-r border-[#28332e] flex flex-col p-5 shadow-xl z-20">
            <nav class="flex-1 space-y-1">
                <p class="text-[9px] font-black text-[#60a5fa] uppercase tracking-widest px-2 mb-3">Main Menu</p>
                <a href="{{ url_for('viewer.viewer_dashboard') }}" class="sidebar-item"><i class="bi bi-speedometer2 text-base"></i> Dashboard</a>
                <a href="{{ url_for('admin.admin_dashboard') }}" class="sidebar-item active"><i class="bi bi-cpu text-base"></i> ETL Control Room</a>
                <a href="{{ url_for('mapping.mapping_page') }}" class="sidebar-item"><i class="bi bi-diagram-3 text-base"></i> Mapping Console</a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-10 bg-[#181f1c]">
            <div class="table-container max-w-7xl mx-auto">
                <h3 class="text-white text-3xl font-black mb-8">ETL Pipeline History</h3>
                </div>
        </main>
    </div>
</body>
</html>
